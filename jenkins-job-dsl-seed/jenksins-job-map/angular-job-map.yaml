projects:
  - name: my-portfolio
    description: "Angular portfolio — build, test & deploy on push"
    repo: ${PORTFOLIO_REPO_URL}
    branch: main
    jenkinsfile: Jenkinsfile
    agent_label: docker-agent
    github_push: true
    folder: angular
    parameters:
      - name: DEPLOY_ENV
        default_value: production
        description: "Target deployment environment"

