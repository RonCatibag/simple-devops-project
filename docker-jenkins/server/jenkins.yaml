jenkins:
  numExecutors: 1
  globalNodeProperties:
    - envVars:
        env:
          - key: "PROJECT_NAME"
            value: "simple-devops-project"
  clouds:
    - docker:
        name: "docker-local"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "docker-agent"
            dockerTemplateBase:
              image: "jenkins-agent:latest"
              mounts:
                - "type=bind,source=/var/run/docker.sock,target=/var/run/docker.sock"
              environmentsString: |
                JENKINS_URL=${JENKINS_URL}
              network: "ci-net"
            remoteFs: "/home/jenkins/agent"
            connector:
              attach:
                user: "jenkins"
            instanceCapStr: "4"
            retentionStrategy:
              idleMinutes: 10
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD:-admin}"
          name: "Administrator"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

