unclassified:
  location:
    url: ${JENKINS_URL}
  githubpluginconfig:
    configs:
      - name: "GitHub"
        apiUrl: "https://api.github.com"
        credentialsId: "jenkins-github-token"
        manageHooks: false
  audit-trail:
    displayUserName: true
    logBuildCause: true
    logCredentialsUsage: true
    loggers:
      - console:
          dateFormat: "yyyy-MM-dd HH:mm:ss.SSS"
          logPrefix: "AUDIT"
          output: "STD_OUT"
      - logFile:
          log: "${JENKINS_HOME}/logs/audit.log"
          limit: 100
          count: 10

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "jenkins-github-token"
              scope: GLOBAL
              secret: "${JENKINS_GITHUB_TOKEN:-placeholder}"
              description: "Jenkins access token for GitHub"
          - usernamePassword:
              description: "Jenkins Github User"
              id: "jenkins-github-user"
              password: "${JENKINS_GITHUB_TOKEN:-placeholder}"
              scope: GLOBAL
              username: "RonaldCatibag"
          - string:
              description: "Github webhook secret"
              id: "github-webhook-secret"
              scope: GLOBAL
              secret: "${GITHUB_WEBHOOK_SECRET:-placeholder}"

jobs:
  - script: |
      pipelineJob('seed-job') {
        description('Reads YAML job maps and creates/updates pipeline jobs via Job DSL')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${DEVOPS_REPO_URL}')
                  credentials('jenkins-github-user')
                }
                branches('*/main')
              }
            }
            scriptPath('docker-jenkins/jenkins-job-dsl-seed/Jenkinsfile.seed')
            lightweight(true)
          }
        }
        triggers {
          githubPush()
        }
        properties {
          disableConcurrentBuilds()
        }
      }
