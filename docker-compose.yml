services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jenkins
      - portfolio
    networks:
      - ci-net

  jenkins:
    build:
      context: ./docker-jenkins/server
      dockerfile: Dockerfile
    container_name: jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-jenkins/server/jenkins.yaml:/var/jenkins.yaml:ro
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--prefix=/jenkins
      - CASC_JENKINS_CONFIG=/var/jenkins.yaml
      - JENKINS_URL=${JENKINS_URL:-https://ronaldcatibag.uk/jenkins/}
      - GITHUB_OAUTH_CLIENT_ID=${GITHUB_OAUTH_CLIENT_ID}
      - GITHUB_OAUTH_CLIENT_SECRET=${GITHUB_OAUTH_CLIENT_SECRET}
      - GITHUB_ADMIN_USERS=${GITHUB_ADMIN_USERS:-RonaldCatibag}
      - JENKINS_GITHUB_TOKEN=${JENKINS_GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - JENKINS_SSH_KEY_PASSWORD=${JENKINS_SSH_KEY_PASSWORD:-}
      - JENKINS_SSH_PRIVATE_KEY=${JENKINS_SSH_PRIVATE_KEY:-}
      - DEVOPS_REPO_URL=${DEVOPS_REPO_URL:-https://github.com/RonCatibag/simple-devops-project.git}
      - PORTFOLIO_REPO_URL=${PORTFOLIO_REPO_URL:-https://github.com/RonCatibag/simple-devops-project.git}
    depends_on:
      - jenkins-agent-build
    networks:
      - ci-net

  jenkins-agent-build:
    build:
      context: ./docker-jenkins/agent
      dockerfile: Dockerfile
    image: jenkins-agent:latest
    container_name: jenkins-agent-build
    command: ["echo", "Agent image built — containers are spawned by Jenkins Docker cloud"]
    restart: "no"
    networks:
      - ci-net

  portfolio:
    build:
      context: ./my-portfolio
      dockerfile: Dockerfile
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - ci-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - ci-net

volumes:
  jenkins_home:

networks:
  ci-net:
    name: ci-net
    driver: bridge
